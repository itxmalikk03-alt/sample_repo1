<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f8;
    font-family:Arial;
}

.card{
    border-radius:12px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

.present{
    background:#d4edda;
}

.absent{
    background:#f8d7da;
}
</style>
</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">📋 Attendance Management System</h2>

<!-- Add Student -->
<div class="card p-3 mb-3">
<input id="studentName" class="form-control mb-2" placeholder="Enter student name">
<button onclick="addStudent()" class="btn btn-primary w-100">Add Student</button>
</div>

<!-- Date -->
<input type="date" id="date" class="form-control mb-3">

<!-- Search -->
<input type="text" id="search" onkeyup="showStudents()" class="form-control mb-3" placeholder="Search student">

<!-- Student List -->
<div id="studentList"></div>

</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function saveData(){
    localStorage.setItem("students",JSON.stringify(students));
}

function addStudent(){
    let name=document.getElementById("studentName").value.trim();
    if(!name) return alert("Enter name");

    students.push({name:name,attendance:{}});
    saveData();
    showStudents();
    document.getElementById("studentName").value="";
}

function markAttendance(i,status){
    let date=document.getElementById("date").value;
    if(!date) return alert("Select date first");

    students[i].attendance[date]=status;
    saveData();
    showStudents();
}

function deleteStudent(i){
    if(confirm("Delete student?")){
        students.splice(i,1);
        saveData();
        showStudents();
    }
}

function getPercentage(att){
    let total=Object.keys(att).length;
    if(total==0) return "0%";

    let present=Object.values(att).filter(v=>v=="Present").length;
    return Math.round((present/total)*100)+"%";
}

function showStudents(){
    let search=document.getElementById("search").value.toLowerCase();
    let list="";

    students.forEach((s,i)=>{
        if(!s.name.toLowerCase().includes(search)) return;

        let percent=getPercentage(s.attendance);

        list+=`
        <div class="card p-3 mb-2">
            <h5>${s.name}</h5>
            <p>Attendance %: <b>${percent}</b></p>

            <button onclick="markAttendance(${i},'Present')" class="btn btn-success btn-sm">Present</button>
            <button onclick="markAttendance(${i},'Absent')" class="btn btn-danger btn-sm">Absent</button>
            <button onclick="deleteStudent(${i})" class="btn btn-dark btn-sm">Delete</button>
        </div>`;
    });

    document.getElementById("studentList").innerHTML=list;
}

showStudents();
</script>

</body>
</html>
