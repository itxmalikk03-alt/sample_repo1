<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Manager</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-address-book"></i> Contact Manager
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <!-- Add Contact Form Section -->
            <div class="col-md-6 mb-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-plus-circle"></i> Add New Contact</h5>
                    </div>
                    <div class="card-body">
                        <form id="contactForm">
                            <!-- Contact Name Input -->
                            <div class="mb-3">
                                <label for="contactName" class="form-label">Full Name <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="contactName" placeholder="Enter full name" required>
                            </div>

                            <!-- Phone Number Input -->
                            <div class="mb-3">
                                <label for="contactPhone" class="form-label">Phone Number <span class="text-danger">*</span></label>
                                <input type="tel" class="form-control" id="contactPhone" placeholder="Enter phone number" required>
                            </div>

                            <!-- Email Input -->
                            <div class="mb-3">
                                <label for="contactEmail" class="form-label">Email Address <span class="text-danger">*</span></label>
                                <input type="email" class="form-control" id="contactEmail" placeholder="Enter email address" required>
                            </div>

                            <!-- Hidden ID field for editing -->
                            <input type="hidden" id="contactId">

                            <!-- Submit Button -->
                            <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                                <i class="fas fa-save"></i> Add Contact
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Search Section -->
            <div class="col-md-6 mb-4">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0"><i class="fas fa-search"></i> Search Contacts</h5>
                    </div>
                    <div class="card-body">
                        <!-- Search Input -->
                        <div class="input-group">
                            <input type="text" class="form-control" id="searchInput" placeholder="Search by name or phone number...">
                            <button class="btn btn-success" type="button" id="clearSearchBtn">
                                <i class="fas fa-times"></i> Clear
                            </button>
                        </div>

                        <!-- Search Results Count -->
                        <div class="mt-3">
                            <p class="text-muted">Total Contacts: <span id="totalContacts">0</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Contacts List Section -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0"><i class="fas fa-list"></i> Your Contacts</h5>
                    </div>
                    <div class="card-body">
                        <!-- Contacts Container -->
                        <div id="contactsList" class="row">
                            <!-- Contacts will be displayed here -->
                            <div class="col-12">
                                <p class="text-center text-muted">No contacts yet. Add one to get started!</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
